<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="i0I6e6O3z9TJXkasg6pHVIOikbaQTwv7cB6jdMHUvQs" />
    <title>Scratch Stats</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- ========================= -->
    <!-- Header / Navbar -->
    <!-- ========================= -->
    <header>
        <h1>Scratch Stats</h1>
        <nav>
            <button id="loginBtn">Login</button>
            <button id="logoutBtn" style="display:none;">Logout</button>
        </nav>
    </header>

    <!-- ========================= -->
    <!-- Main Content -->
    <!-- ========================= -->
    <main>

        <!-- Stats Section -->
        <section id="statsSection">
            <h2>Global Scratch Stats</h2>
            <div class="stats-grid">
                <div class="stat-card"><span id="totalUsers"></span> Users</div>
                <div class="stat-card"><span id="totalProjects"></span> Projects</div>
                <div class="stat-card"><span id="totalStudios"></span> Studios</div>
                <div class="stat-card"><span id="totalComments"></span> Comments</div>
            </div>
        </section>

        <!-- Search Section -->
        <section id="searchSection">
            <h2>Search Scratch</h2>
            <div class="search-wrapper">
                <input id="searchInput" placeholder="Search projects or users...">
                <button onclick="performSearch()">Search</button>
                <div id="searchSuggestions" class="suggestions"></div>
            </div>
        </section>

        <!-- Featured Content -->
        <section id="featuredSection">
            <h2>Featured Content</h2>

            <h3>Projects</h3>
            <div id="featuredProjects" class="featured-grid"></div>

            <h3>Studios</h3>
            <div id="featuredStudios" class="featured-grid"></div>

            <h3>Users</h3>
            <div id="featuredUsers" class="featured-grid"></div>
        </section>

        <!-- Admin Panel -->
        <section id="adminPanel" style="display:none;">
            <h2>Admin Panel</h2>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tabFeatured">Featured</button>
                <button class="tab-btn" data-tab="tabVerified">Verified</button>
                <button class="tab-btn" data-tab="tabRequests">Requests</button>
            </div>

            <!-- Tab Content -->
            <div id="tabFeatured" class="tab-content active">
                <h3>Manage Featured</h3>
                <div id="manageFeaturedProjects"></div>
                <div id="manageFeaturedStudios"></div>
                <div id="manageFeaturedUsers"></div>
            </div>

            <div id="tabVerified" class="tab-content">
                <h3>Verified Users</h3>
                <div id="verifiedUsersList"></div>
            </div>

            <div id="tabRequests" class="tab-content">
                <h3>Pending Requests</h3>
                <div id="pendingVerifyList"></div>
                <div id="pendingAdminList"></div>
            </div>
        </section>

    </main>

    <!-- ========================= -->
    <!-- Modals -->
    <!-- ========================= -->

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Admin Login</h2>
            <form id="loginForm">
                <input id="username" placeholder="Username">
                <input id="password" type="password" placeholder="Password">
                <div id="loginError" class="error"></div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="searchModal" class="modal">
        <div class="modal-content">
            <span onclick="closeSearchModal()" class="close">&times;</span>
            <div id="searchResults"></div>
        </div>
    </div>

    <!-- Request Modal -->
    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="close-request">&times;</span>
            <h2 id="requestTitle"></h2>
            <form id="requestForm">
                <input id="requestUsername" placeholder="Your Scratch Username">
                <textarea id="requestReason" placeholder="Why?"></textarea>
                <input id="passwordField" type="password" placeholder="Admin Password" style="display:none;">
                <button type="submit">Submit Request</button>
            </form>
        </div>
    </div>

    <!-- ========================= -->
    <!-- Scripts -->
    <!-- ========================= -->
    <script src="script.js"></script>

</body>
</html>
